# Example configuration for Kronos pretraining
# 预训练配置示例

data:
  # Data directory containing multiple CSV files
  data_dir: "D:/dev/Kronos/download/data/"
  
  lookback_window: 512
  predict_window: 48
  max_context: 512
  clip: 5.0
  
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0
  
  # Control data loading
  max_files: 50  # Load first 50 files for testing
  sample_per_file: 500  # 500 samples per file

training:
  # Pretraining requires more epochs
  tokenizer_epochs: 50
  basemodel_epochs: 100
  
  batch_size: 2
  log_interval: 100
  num_workers: 8
  seed: 42
  
  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.00001
  
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1
  
  accumulation_steps: 2

model_paths:
  # Reference architecture (not loading weights)
  pretrained_tokenizer: "../../pretrained/Kronos-Tokenizer-2k"
  pretrained_predictor: "../../pretrained/Kronos-small"
  
  exp_name: "pretrain_example_50stocks"
  base_path: "../../output/pretrain/"
  
  base_save_path: ""
  finetuned_tokenizer: ""
  
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "pretrain_example_50stocks"
  description: "Example pretraining on 50 stocks"
  use_comet: false
  
  train_tokenizer: true
  train_basemodel: true
  skip_existing: false
  
  # IMPORTANT: Random initialization for pretraining
  pre_trained_tokenizer: false
  pre_trained_predictor: false

device:
  use_cuda: true
  device_id: 0

distributed:
  use_ddp: false
  backend: nccl
